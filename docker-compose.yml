services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - GENERIC_TIMEZONE=Asia/Karachi
      - DB_TYPE=sqlite
      - DB_STORAGE=/home/node/.n8n/database.sqlite
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data: